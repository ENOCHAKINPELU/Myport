<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog | Akinpelu Enoch</title>
  <meta name="description" content="Articles on technical project management, digital transformation, and software delivery by Akinpelu Enoch." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3SQRVDGXB8"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3SQRVDGXB8');</script>
  <link rel="canonical" href="https://enochakinpelu.github.io/Myport/blog/index.html" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/blog.css" />

  <!-- Social sharing preview -->
  <meta property="og:title" content="Blog | Akinpelu Enoch" />
  <meta property="og:description" content="Articles on technical project management, digital transformation, and software delivery." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://enochakinpelu.github.io/Myport/blog/index.html" />
</head>
<body>
  <header>
    <nav>
      <a href="../index.html" class="logo">ENOCH</a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <ul class="nav-links">
        <li><a href="../index.html#about">Home</a></li>
        <li><a href="../index.html#projects">Innovation Portfolio</a></li>
        <li><a href="./index.html">Blog</a></li>
        <li><a href="../index.html#contact">Let's Talk</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <h1>Blog</h1>
      <p>Thoughts on technical project management, digital transformation, and software delivery.</p>
    </section>

    <section class="blog-posts">
      <h2 class="section-title">Latest Articles</h2>
      <div id="post-grid" class="post-grid"></div>
      <div id="empty-state" class="empty-state" style="display: none;">
        <p>No articles published yet. Check back soon!</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; <span id="current-year"></span> Akinpelu Enoch. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();

    // Mobile nav toggle
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    navToggle.addEventListener('click', () => {
      navToggle.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    function formatDate(dateString) {
      if (!dateString) return '';
      return new Date(dateString).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    async function loadPosts() {
      const grid = document.getElementById('post-grid');
      const emptyState = document.getElementById('empty-state');

      const { data: posts, error } = await supabaseClient
        .from('posts')
        .select('slug, title, excerpt, cover_image_url, published_at')
        .eq('status', 'published')
        .order('published_at', { ascending: false });

      if (error) {
        console.error('Failed to load posts:', error);
        emptyState.style.display = 'block';
        emptyState.querySelector('p').textContent = 'Unable to load articles right now.';
        return;
      }

      if (!posts || posts.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      grid.innerHTML = posts.map(post => `
        <article class="post-card">
          <a class="post-card-link" href="./post.html?slug=${encodeURIComponent(post.slug)}">
            ${post.cover_image_url
              ? `<img class="post-card-cover" src="${post.cover_image_url}" alt="${post.title}" />`
              : `<div class="post-card-cover"></div>`}
            <div class="post-card-body">
              <span class="post-card-date">${formatDate(post.published_at)}</span>
              <h3>${post.title}</h3>
              <p>${post.excerpt || ''}</p>
            </div>
          </a>
        </article>
      `).join('');
    }

    loadPosts();
  </script>
</body>
</html>
